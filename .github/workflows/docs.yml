name: Deploy Documentation

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      package_name:
        required: true
        type: string
      python_version:
        required: true
        type: string
      is_prerelease:
        required: true
        type: string
        default: "false"

permissions:
  contents: write

env:
  PACKAGE_NAME: ${{ inputs.package_name }}
  PYTHON_VERSION: ${{ inputs.python_version }}
  IS_PRERELEASE: ${{ inputs.is_prerelease }}
  # Extra system dependencies required before package install (leave empty if none)
  EXTRA_SYSTEM_DEPS: ""

jobs:
  deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install extra system dependencies
        if: env.EXTRA_SYSTEM_DEPS != ''
        run: |
          echo "📦 Installing extra system dependencies..."
          uv pip install ${{ env.EXTRA_SYSTEM_DEPS }} --no-cache-dir

      - name: Install package with docs and test dependencies
        run: |
          echo "📦 Installing package with docs and test dependencies..."
          uv sync --extra docs --extra test

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libdbus-1-3 \
            xvfb || true

      - name: Generate coverage report
        run: |
          echo "🧪 Running tests and generating coverage report..."
          export QT_QPA_PLATFORM=offscreen
          export QT_QPA_PLATFORM_MINIMAL_PLUGINS=1
          uv run pytest --cov=src/ --cov-report=html --cov-report=xml -q || true
          echo "✅ Coverage report generated!"

      - name: Enforce import contracts
        run: |
          echo "🧭 Enforcing import contracts with import-linter..."
          uv run lint-imports
          echo "✅ Import contracts enforced"

      - name: Generate architecture graph
        run: |
          echo "🏗️ Generating architecture dependency graph..."
          uv run python .scripts/dev/generate_architecture_graph.py
          echo "✅ Architecture graph generated!"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output docs/changelog.md

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy versioned documentation
        run: |
          VERSION="${{ inputs.version || 'dev' }}"
          IS_PRERELEASE="${{ env.IS_PRERELEASE }}"
          echo "📚 Deploying versioned documentation for ${{ env.PACKAGE_NAME }} ($VERSION, pre-release=$IS_PRERELEASE)..."
          if [ "$IS_PRERELEASE" = "true" ]; then
            # Pre-release: publish the version but do NOT move the latest alias
            uv run mike deploy --push "$VERSION"
            echo "✅ Documentation deployed: $VERSION (pre-release — latest alias unchanged)"
          else
            uv run mike deploy --push --update-aliases "$VERSION" latest
            uv run mike set-default --push latest
            echo "✅ Documentation deployed: $VERSION → latest"
          fi
