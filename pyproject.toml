# ///////////////////////////////////////////////////////////////
# 🔨 BUILD SYSTEM
# Defines the build backend and requirements
# ///////////////////////////////////////////////////////////////

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ///////////////////////////////////////////////////////////////
# 📦 PROJECT METADATA
# Package information, version, authors, and classifiers
# ///////////////////////////////////////////////////////////////

[project]
name = "ezqt-widgets"
version = "2.6.6"
description = "A collection of custom and reusable Qt widgets for PySide6. Provides advanced, reusable, and stylish graphical components to facilitate the development of modern and user-friendly interfaces."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Neuraaak" }]
maintainers = [{ name = "Neuraaak" }]
keywords = [
    "qt",
    "pyside6",
    "widgets",
    "gui",
    "interface",
    "components",
    "ui",
    "desktop",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: User Interfaces",
    "Topic :: Desktop Environment",
    "Topic :: Software Development :: Widget Sets",
]

# ///////////////////////////////////////////////////////////////
# 📚 DEPENDENCIES
# Core production dependencies for runtime
# ///////////////////////////////////////////////////////////////

dependencies = [
    "PySide6>=6.7.3,<7.0.0",
    "click>=8.2.1",
    "rich>=13.0.0",
    "PyYAML>=6.0",
    "typing_extensions>=4.0.0",
]

# ///////////////////////////////////////////////////////////////
# 🛠️ OPTIONAL DEPENDENCIES
# Development tools, testing, and build dependencies
# ///////////////////////////////////////////////////////////////

[project.optional-dependencies]
dev = [
    # Development tools
    "ruff>=0.1.0",
    "ty>=0.0.13",
    "pyright>=1.1.0",
    "pre-commit>=3.0.0",
    "import-linter>=2.0.0",
    "types-requests",
    "types-PyYAML",

    # Security
    "bandit>=1.7.0",

    # Tests
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "pytest-xdist>=3.0.0",

    # Build and distribution
    "build>=1.0.0",
    "twine>=4.0.0",

    # Documentation generation
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.27.0",
    "mkdocs-section-index>=0.3.0",
]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "pytest-xdist>=3.0.0",
    "import-linter>=2.0.0",
]
docs = [
    "mkdocs>=1.6.0,<2.0.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.27.0",
    "mkdocs-section-index>=0.3.0",
    "mkdocs-coverage>=1.1.0",
    "git-cliff>=2.7.0",
]

# ///////////////////////////////////////////////////////////////
# 🔗 PROJECT URLS
# Links to repository, documentation, and package index
# ///////////////////////////////////////////////////////////////

[project.urls]
Homepage = "https://github.com/neuraaak/ezqt-widgets"
Documentation = "https://neuraaak.github.io/ezqt-widgets/"
Repository = "https://github.com/neuraaak/ezqt-widgets"
PyPI = "https://pypi.org/project/ezqt-widgets/"

# ///////////////////////////////////////////////////////////////
# 🖥️ SCRIPTS
# Entry points for command-line tools
# ///////////////////////////////////////////////////////////////

[project.scripts]
ezqt-widgets = "ezqt_widgets.cli.main:cli"

# ///////////////////////////////////////////////////////////////
# 📦 HATCHLING CONFIGURATION
# Package discovery and inclusion/exclusion patterns
# ///////////////////////////////////////////////////////////////

[tool.hatch.build.targets.wheel]
packages = ["src/ezqt_widgets"]

[tool.hatch.build.targets.sdist]
exclude = [
    "tests",
    "docs",
    "examples",
    "htmlcov",
    ".hooks",
    ".venv",
    "venv",
    ".git",
    ".ruff_cache",
    ".pytest_cache",
    ".cursor",
    ".tmp",
    "*.pyc",
    "*.pyo",
    "*.log",
    ".coverage",
    "coverage.xml",
    ".DS_Store",
    "Thumbs.db",
]

# ///////////////////////////////////////////////////////////////
# 🎨 CODE FORMATTING & LINTING TOOLS
# Auto-formatting, import sorting, and style checking
# ///////////////////////////////////////////////////////////////

# Ruff: All-in-one linter with comprehensive rule sets
[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort-compatible import sorting (via ruff)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # bandit security
    "T20", # flake8-print
    "ARG", # flake8-unused-arguments
    "PIE", # flake8-pie
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line too long, handled by ruff format
    "B008", # do not perform function calls in argument defaults
    "S101", # assert_used (for tests)
    "S106", # hardcoded_password_funcarg
    "T201", # print statements (for init.py and scripts)
    "S603", # subprocess.run without check=True
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["S101", "S311", "E501", "ARG002", "S105", "S602", "S603"]
"examples/**/*" = ["T201", "E501"]
"src/ezqt_widgets/cli/**/*" = ["T201", "E501", "S603"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# ///////////////////////////////////////////////////////////////
# ✅ TYPE CHECKING TOOLS
# Static type analysis with minimal and comprehensive modes
# ///////////////////////////////////////////////////////////////

# Ty: Type checking with minimal configuration
[tool.ty.environment]
python-version = "3.11"
root = ["src", "src/ezqt_widgets"]

[tool.ty.src]
include = ["src/ezqt_widgets/**/*.py"]
exclude = [
    "**/__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    "tests",
    "docs",
    "examples",
]
respect-ignore-files = true

[tool.ty.terminal]
output-format = "full"
error-on-warning = false

[tool.ty.rules]
# Ignore PySide6 stub issues (isValid, setIcon, setText overloads)
no-matching-overload = "ignore"

# Pyright: Comprehensive type checking with detailed reporting
[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
include = ["src/ezqt_widgets"]
exclude = [
    "**/__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    "tests",
    "docs",
    "examples",
    "**/node_modules",
    "**/.*",
]
reportMissingImports = true
reportMissingTypeStubs = false
reportUnusedImport = true
reportUnusedClass = true
reportUnusedFunction = true
reportUnusedVariable = true
reportDuplicateImport = true
reportOptionalSubscript = true
reportOptionalMemberAccess = true
reportOptionalCall = true
reportOptionalIterable = true
reportOptionalContextManager = true
reportOptionalOperand = true
reportUntypedFunctionDecorator = false
reportUntypedClassDecorator = false
reportUntypedBaseClass = false
reportUntypedNamedTuple = false
reportPrivateUsage = false
reportConstantRedefinition = true
# Disabled: Qt widgets intentionally override methods with properties
reportIncompatibleMethodOverride = false
reportIncompatibleVariableOverride = true
reportInconsistentConstructor = true

# ///////////////////////////////////////////////////////////////
# � IMPORT LINTER CONTRACTS
# Layer dependency contracts enforced in CI
# ///////////////////////////////////////////////////////////////

[tool.importlinter]
root_packages = ["ezqt_widgets"]
# Note: import-linter 2.x ne supporte pas source_paths (feature pending PR #323).
# Le package doit être installé en mode editable (uv sync) ou lancer avec PYTHONPATH=src lint-imports

[[tool.importlinter.contracts]]
name = "layer dependency flow"
type = "layers"
layers = ["ezqt_widgets.cli", "ezqt_widgets.widgets", "ezqt_widgets.utils"]

# ///////////////////////////////////////////////////////////////
# �🧪 TESTING & COVERAGE TOOLS
# Test execution, coverage analysis, and test configuration
# ///////////////////////////////////////////////////////////////

# Pytest: Test runner with coverage and detailed reporting
[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=src/ezqt_widgets",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
    "--cov-fail-under=60",
    "--verbose",
    "--tb=short",
    "--color=yes",
    "--durations=10",
    "--maxfail=5",
]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "robustness: marks tests as robustness tests",
    "unit: marks tests as unit tests (default)",
    "wizard: marks tests related to RichWizard",
    "config: marks tests related to ConfigurationManager",
    "cli: marks tests related to CLI",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

# Coverage: Code coverage measurement and reporting (60% minimum)
[tool.coverage.run]
source = ["src/ezqt_widgets"]
branch = true
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/site-packages/*",
    "*/.pytest_cache/*",
    "*/.benchmarks/*",
    "*/.vscode/*",
    "*/.egg-info/*",
    "*/.hooks/*",
    "setup.py",
    "build/*",
    "dist/*",
    ".venv/*",
    "venv/*",
    "htmlcov/*",
    "coverage.xml",
    ".coverage",
    "docs/*",
    "examples/*",
    "_temp/*",
    # Modules non testables unitairement (CLI / lanceur d'exemples Qt via subprocess)
    "*/cli/main.py",
    "*/cli/runner.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
    "if platform.system\\(\\) == \"Windows\":",
    "except ImportError:",
]
show_missing = true
precision = 2

[tool.coverage.html]
directory = "htmlcov"

# ///////////////////////////////////////////////////////////////
# 🔒 SECURITY TOOLS
# Code security scanning and vulnerability detection
# ///////////////////////////////////////////////////////////////

# Bandit: Security linter (detects common security issues)
[tool.bandit]
exclude_dirs = [
    "tests",
    "build",
    "dist",
    "venv",
    ".venv",
    ".hooks",
    "docs",
    "examples",
    "_temp",
]
skips = ["B101", "B601"]
